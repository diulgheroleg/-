<!DOCTYPE html>

<html lang="ru">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<title>ReBootFix — ремонт планшетов</title>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<link href="style_edited.css" rel="stylesheet"/>
<link href="modal.css" rel="stylesheet"/>
</head>
<body class="page">
<header class="header">
<div class="container header__inner">
<a class="logo" href="index.html">
<div class="logo__icon"><img alt="ReBootFix" src="logo-rebootfix-black.png"/></div>
<div class="logo__text">ReBoot<span>Fix</span></div>
</a>
<div class="header__actions">
<a class="btn btn--primary" href="index.html#contacts">Консультация</a>
<a class="btn btn--primary" href="index.html">Вернуться назад</a>
</div>
</div>
</header>
<main class="models-page">
  <div class="container">
    <div class="models-header">
      <div>
        <div class="models-title">Ремонт планшетов</div>
      </div>
    </div>

    <h2 class="models-section-title">Apple iPad</h2>
    <div class="cards-grid" id="modelsGrid"></div>

    <section class="find-device">
      <div class="find-device__text">
        <div class="find-device__title">Не нашли свой планшет?</div>
        <div class="find-device__sub">Напишите в Telegram — уточним модель и проблему и подскажем ориентировочную стоимость.</div>
      </div>
      <a class="btn btn--primary" href="https://t.me/ReBootFix" target="_blank" rel="noopener">Узнать точную стоимость</a>
    </section>

<div class="models-actions" style="margin-top:18px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap;">
  <a class="btn btn--primary" href="index.html#contacts">Консультация</a>
  <a class="btn btn--primary" href="index.html">Вернуться назад</a>
</div>
  </div>
</main>


<script>
  document.addEventListener('DOMContentLoaded', function(){
    if(window.renderModelCards && window.getBrandModels){
      renderModelCards('modelsGrid', getBrandModels('ipad'), {previewLimit: 3, maxModels: 20});
    }

  });
</script>

<!-- Modal: услуги выбранной модели -->
<div class="services-modal" id="servicesModal" aria-hidden="true">
  <div class="services-modal__backdrop"></div>
  <div class="services-modal__panel" role="dialog" aria-modal="true">
    <div class="services-modal__head">
      <div>
        <div class="services-modal__title" data-modal-title>Услуги</div>
        <div class="services-modal__sub" data-modal-sub></div>
      </div>
      <button class="services-modal__close" type="button" data-modal-close aria-label="Закрыть">✕</button>
    </div>
    <div class="services-modal__body">
      <div class="services-list" data-modal-list></div>
    </div>
  </div>
</div>

<script src="device-data.js"></script>
<script src="models-render.js"></script>
<script src="services-modal.js"></script>
</body>
</html>
